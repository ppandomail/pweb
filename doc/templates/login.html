<html>
<head>
    <title>Login</title>
</head>
<body>
    <h1>User Login</h1>
    {% if error %}
         <p>{{ error }}!</p>
    {% endif %}
    <form action="{{ url_for('login') }}" method='post'>
        <input type='text' name='username' placeholder='Username'>
        <br>
        <input type='password' name='password' placeholder='Password'> 
        <br>
        <button>Enviar</button>
    </form>
</body>
</html>
